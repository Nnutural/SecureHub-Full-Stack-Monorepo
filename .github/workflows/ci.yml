name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: securehub
          POSTGRES_PASSWORD: securehub
          POSTGRES_DB: securehub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U securehub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://securehub:securehub@localhost:5432/securehub
      REDIS_URL: redis://localhost:6379/0
      LLM_PROVIDER: xfyun
      XFYUN_APP_ID: ""
      XFYUN_API_KEY: ""
      XFYUN_API_SECRET: ""
      MIN_EVIDENCE: "3"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run python -c "from app.main import app; print(app.title)"
      - run: uv run alembic upgrade head
      - run: uv run pytest --collect-only -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
